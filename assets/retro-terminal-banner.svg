<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Retro terminal banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f0b" />
      <stop offset="100%" stop-color="#030603" />
    </linearGradient>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#000000" fill-opacity="0.12" />
      <rect y="3" width="6" height="3" fill="#00ff66" fill-opacity="0.02" />
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="1160" height="320" rx="14" fill="url(#bg)" stroke="#1b2a1b" stroke-width="2" />
  <rect x="20" y="20" width="1160" height="320" rx="14" fill="url(#scan)" />

  <circle cx="58" cy="44" r="7" fill="#ff5f56" />
  <circle cx="82" cy="44" r="7" fill="#ffbd2e" />
  <circle cx="106" cy="44" r="7" fill="#27c93f" />

  <text x="52" y="94" font-family="Consolas, 'Courier New', monospace" font-size="26" fill="#39ff88" filter="url(#glow)">
    C:\Users\Dylan&gt; whoami
  </text>
  <text x="52" y="132" font-family="Consolas, 'Courier New', monospace" font-size="34" fill="#8dffb8" filter="url(#glow)">
    Dylan Austin - Full Stack Developer
  </text>
  <text x="52" y="182" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#60ff9f" filter="url(#glow)">
    stack --list: html css javascript python django react-native
  </text>
  <text x="52" y="220" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#60ff9f" filter="url(#glow)">
    status: building useful apps for web, desktop, and mobile
  </text>
  <text x="52" y="270" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#39ff88" filter="url(#glow)">
    C:\Users\Dylan&gt; _
  </text>
</svg>
